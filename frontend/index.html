<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TodoApp - Manage your tasks efficiently">
    <title>TodoApp - Login & Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div id="auth-container" class="show-login">
            <!-- Header -->
            <div class="auth-header">
                <h1>📝 TodoApp</h1>
                <p>Organize your tasks, boost your productivity</p>
            </div>

            <!-- Login Form -->
            <form class="auth-form login-form" id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input 
                        type="text" 
                        id="login-username" 
                        placeholder="Enter your username" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input 
                        type="password" 
                        id="login-password" 
                        placeholder="Enter your password" 
                        required
                    >
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
            </form>

            <!-- Register Form -->
            <form class="auth-form register-form" id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input 
                        type="text" 
                        id="register-username" 
                        placeholder="Choose a username" 
                        required
                        minlength="3"
                    >
                </div>

                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input 
                        type="email" 
                        id="register-email" 
                        placeholder="Enter your email" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="register-firstname">First Name</label>
                    <input 
                        type="text" 
                        id="register-firstname" 
                        placeholder="Enter your first name" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="register-lastname">Last Name</label>
                    <input 
                        type="text" 
                        id="register-lastname" 
                        placeholder="Enter your last name" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="register-phone">Phone Number</label>
                    <input 
                        type="tel" 
                        id="register-phone" 
                        placeholder="Enter your phone number" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input 
                        type="password" 
                        id="register-password" 
                        placeholder="Create a password" 
                        required
                        minlength="6"
                    >
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Register</button>
                </div>
            </form>

            <!-- Footer with Toggle -->
            <div class="auth-footer">
                <div class="login-footer" id="login-footer">
                    <p>Don't have an account?</p>
                    <button type="button" onclick="toggleAuthForm()">Sign Up</button>
                </div>

                <div class="register-footer" id="register-footer" style="display: none;">
                    <p>Already have an account?</p>
                    <button type="button" onclick="toggleAuthForm()">Sign In</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Toggle footer visibility based on active form
        function updateFooterDisplay() {
            const container = document.getElementById('auth-container');
            const loginFooter = document.getElementById('login-footer');
            const registerFooter = document.getElementById('register-footer');

            if (container.classList.contains('show-login')) {
                loginFooter.style.display = 'block';
                registerFooter.style.display = 'none';
            } else {
                loginFooter.style.display = 'none';
                registerFooter.style.display = 'block';
            }
        }

        // Observe for class changes
        const observer = new MutationObserver(updateFooterDisplay);
        observer.observe(document.getElementById('auth-container'), { attributes: true });

        // Redirect to dashboard if already logged in
        if (TokenManager.isAuthenticated()) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
